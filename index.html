.btn-dark{

}
.btn-dark:active{transform:scale(.96);}

.chip{font-size:12px; font-weight:800; padding:4px 10px; border-radius:999px; white-space:nowrap;}

.bubble{

  border-radius:18px; padding:10px 14px; font-size:13px; font-weight:700;
  max-width:230px; line-height:1.5;
}
.bubble:after{

}

  async get(k){
    if (window.storage) { try { const r = await window.storage.get(k); if (r && r.value != null) return r.value; } catch(e){} }
    try { const v = localStorage.getItem(k); if (v != null) return v; } catch(e){}
    return null;
  },
  async set(k, v){
    if (window.storage) { try { await window.storage.set(k, v); } catch(e){} }

};

/* ---------- ユーティリティ ---------- */
const pad = (n) => String(n).padStart(2,"0");
const todayStr = () => { const d=new Date(); return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; };
const dateStrOf = (d) => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;

function hashSeed(str){ let h=1779033703; for(let i=0;i<str.length;i++){ h=Math.imul(h^str.charCodeAt(i),3432918353); h=(h<<13)|(h>>>19);} return h>>>0; }
function seededShuffle(arr, seed){
  const a=[...arr]; let s=seed;
  const rnd=()=>{ s=(s*1664525+1013904223)>>>0; return s/4294967296; };
  for(let i=a.length-1;i>0;i--){ const j=Math.floor(rnd()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}
function pick(arr, seed){ return arr[hashSeed(String(seed)) % arr.length]; }

function levelFromXp(xp){
  let level=1, need=100, rest=xp;
  while(rest>=need){ rest-=need; level+=1; need=level*100; }
  return {level, into:rest, need};
}

/* ---------- ビープ音 ---------- */
function useBeeper(){
  const ctxRef = useRef(null);
  const ensure = () => {
    if(!ctxRef.current){ const AC = window.AudioContext||window.webkitAudioContext; if(AC) ctxRef.current = new AC(); }
    if(ctxRef.current && ctxRef.current.state==="suspended") ctxRef.current.resume();
    return ctxRef.current;
  };
  const beep = (freq=880, dur=0.12, vol=0.25) => {
    const ctx = ensure(); if(!ctx) return;
    const osc = ctx.createOscillator(), gain = ctx.createGain();
    osc.type="sine"; osc.frequency.value=freq;
    gain.gain.setValueAtTime(vol, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+dur);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(); osc.stop(ctx.currentTime+dur);
  };
  return {beep, ensure};
}

function Mela({stage=1, mood="happy", size=150, cheering=false}){

        <circle cx="110" cy="121" r="6" fill="#2B1B16"/>
        <path d="M88 134 q12 14 24 0 z" fill="#2B1B16"/>

        <ellipse cx="111" cy="118" rx="6.5" ry="9" fill="#2B1B16"/>
        <circle cx="91" cy="115" r="2.4" fill="#fff"/>
        <circle cx="113" cy="115" r="2.4" fill="#fff"/>
        <path d="M90 136 q10 9 20 0" stroke="#2B1B16" strokeWidth="5" strokeLinecap="round" fill="none"/>
        <circle cx="74" cy="130" r="6" fill="#FFB59E"/>
        <circle cx="126" cy="130" r="6" fill="#FFB59E"/>

  const flamePath = "M100 34 C 121 64, 153 86, 153 127 A 53 53 0 0 1 47 127 C 47 86, 79 64, 100 34 Z";
  const innerPath = "M100 92 C 110 106, 126 116, 126 137 A 26 26 0 0 1 74 137 C 74 116, 90 106, 100 92 Z";

  return (
    <div className={cheering ? "cheering" : "bob"} style={{width:size, height:size}}>
      <svg viewBox="0 0 200 200" width={size} height={size} aria-label={`キャラクター メラ(ステージ${stage})`}>
        {/* 影 */}
        <ellipse cx="100" cy="176" rx="46" ry="9" fill="rgba(28,43,38,.10)"/>

            <circle cx="80" cy="104" r="8" fill="#FFD9A6"/>
            <circle cx="118" cy="140" r="10" fill="#FFD9A6"/>
            <circle cx="112" cy="98" r="5" fill="#FFD9A6"/>

            <Face y={4}/>
          </g>
        ) : (
          <g transform={stage===2 ? "translate(100 116) scale(0.78) translate(-100 -108)" : ""}>
            {/* 翼(フェニックス) */}
            {stage>=5 && (

                <path d="M50 118 C 20 100, 12 70, 22 48 C 34 72, 44 84, 58 92 Z"/>

              </g>
            )}
            <path d={flamePath} fill={bodyColor}/>
            <path d={innerPath} fill={innerColor}/>
            {/* 腕(メラ以降) */}
            {stage>=3 && (
              <g stroke={bodyColor} strokeWidth="13" strokeLinecap="round">
                {stage>=4
                  ? <><path d="M52 128 q-16 -8 -14 -26" fill="none"/><path d="M148 128 q16 -8 14 -26" fill="none"/></>
                  : <><path d="M54 132 q-14 6 -18 16" fill="none"/><path d="M146 132 q14 6 18 16" fill="none"/></>}

            {/* 王冠(フェニックス) */}
            {stage>=5 && (
              <path d="M84 40 L90 26 L100 38 L110 26 L116 40 Z" fill="#FFD34D" stroke="#E8B60F" strokeWidth="2"/>
            )}
            <Face y={0}/>
          </g>
        )}
      </svg>
    </div>
  );
}

/* ============================================================
   3D動作デモ(Three.js)
   関節付きの人型フィギュアを組み立て、種目ごとの動きをループ再生
   ============================================================ */
const SIDE_VIEW = new Set(["マウンテンクライマー","プランク","膝つき腕立て","バイシクルクランチ","ヒップリフト"]);

function buildFigure(THREE){
  const orange = new THREE.MeshStandardMaterial({color:0xFF5A2D, roughness:.55});
  const gold   = new THREE.MeshStandardMaterial({color:0xFFB020, roughness:.55});
  const dark   = new THREE.MeshStandardMaterial({color:0x1C2B26, roughness:.6});

  /* 関節を原点とし、-y方向に伸びるパーツ。tipが末端の取り付け点 */
  const seg = (r1, r2, h, mat) => {
    const g = new THREE.Group();
    const m = new THREE.Mesh(new THREE.CylinderGeometry(r1, r2, h, 10), mat);
    m.position.y = -h/2; g.add(m);
    g.add(new THREE.Mesh(new THREE.SphereGeometry(r1*1.06, 10, 8), mat));
    const tip = new THREE.Group(); tip.position.y = -h; g.add(tip);
    return {g, tip};
  };

  const root = new THREE.Group(); root.position.y = 0.95;
  const pelvis = new THREE.Mesh(new THREE.SphereGeometry(0.15, 12, 10), orange);
  pelvis.scale.set(1.15, 0.8, 0.85); root.add(pelvis);

  const torso = new THREE.Group(); root.add(torso);
  const chest = new THREE.Mesh(new THREE.CylinderGeometry(0.16, 0.125, 0.5, 12), orange);
  chest.position.y = 0.3; torso.add(chest);
  const head = new THREE.Mesh(new THREE.SphereGeometry(0.145, 14, 12), gold);
  head.position.y = 0.73; torso.add(head);
  const eyeL = new THREE.Mesh(new THREE.SphereGeometry(0.022, 8, 8), dark);
  const eyeR = eyeL.clone();
  eyeL.position.set(-0.05, 0.76, 0.125); eyeR.position.set(0.05, 0.76, 0.125);
  torso.add(eyeL); torso.add(eyeR);

  const mkArm = (sx) => {
    const sh = new THREE.Group(); sh.position.set(sx*0.225, 0.52, 0); torso.add(sh);
    const up = seg(0.052, 0.046, 0.27, orange); sh.add(up.g);
    const el = new THREE.Group(); up.tip.add(el);
    const fo = seg(0.046, 0.04, 0.25, orange); el.add(fo.g);
    const hand = new THREE.Mesh(new THREE.SphereGeometry(0.055, 8, 8), gold);
    fo.tip.add(hand);
    return {sh, el};
  };
  const armL = mkArm(-1), armR = mkArm(1);

  const mkLeg = (sx) => {
    const hip = new THREE.Group(); hip.position.set(sx*0.115, -0.06, 0); root.add(hip);
    const th = seg(0.072, 0.056, 0.4, orange); hip.add(th.g);
    const knee = new THREE.Group(); th.tip.add(knee);
    const sh2 = seg(0.052, 0.045, 0.4, orange); knee.add(sh2.g);
    const foot = new THREE.Mesh(new THREE.BoxGeometry(0.095, 0.06, 0.21), dark);
    foot.position.set(0, -0.015, 0.055); sh2.tip.add(foot);
    return {hip, knee};
  };
  const legL = mkLeg(-1), legR = mkLeg(1);

  return {
    root, torso,
    shL:armL.sh, shR:armR.sh, elL:armL.el, elR:armR.el,
    hipL:legL.hip, hipR:legR.hip, kneeL:legL.knee, kneeR:legR.knee,
  };
}

function resetPose(f){
  f.root.position.set(0, 0.95, 0);
  f.root.rotation.set(0, 0, 0);
  [f.torso, f.shL, f.shR, f.elL, f.elR, f.hipL, f.hipR, f.kneeL, f.kneeR]
    .forEach(o => o.rotation.set(0, 0, 0));
  f.shL.rotation.z = -0.12; f.shR.rotation.z = 0.12; /* 気をつけの姿勢 */
}

/* キーフレーム線形補間(バーピー用) */
function lerpKeys(keys, u){
  for(let i=0; i<keys.length-1; i++){
    if(u >= keys[i].u && u <= keys[i+1].u){
      const a=keys[i].p, b=keys[i+1].p;
      const s=(u-keys[i].u)/(keys[i+1].u-keys[i].u);
      const out={};
      Object.keys(a).forEach(k => out[k] = a[k] + (b[k]-a[k])*s);
      return out;
    }
  }
  return keys[0].p;
}

const POSES = {
  "ジャンピングジャック": (f,t)=>{
    const u=(Math.sin(t*7)+1)/2;
    f.shL.rotation.z=-(0.12+u*2.7); f.shR.rotation.z=0.12+u*2.7;
    f.hipL.rotation.z=-u*0.5; f.hipR.rotation.z=u*0.5;
    f.root.position.y=0.95+Math.max(0,Math.sin(t*7))*0.1;
  },
  "スクワット": (f,t)=>{
    const c=(1-Math.cos(t*3))/2;
    f.hipL.rotation.x=f.hipR.rotation.x=-1.5*c;
    f.kneeL.rotation.x=f.kneeR.rotation.x=1.9*c;
    f.root.position.y=0.95-0.34*c;
    f.torso.rotation.x=0.45*c;
    f.shL.rotation.x=f.shR.rotation.x=-1.25*c;
  },
  "もも上げ(ハイニー)": (f,t)=>{
    const a=Math.max(0,Math.sin(t*7)), b=Math.max(0,-Math.sin(t*7));
    f.hipL.rotation.x=-1.5*a; f.kneeL.rotation.x=1.4*a+0.1;
    f.hipR.rotation.x=-1.5*b; f.kneeR.rotation.x=1.4*b+0.1;
    f.shL.rotation.x=0.5*a-0.9*b; f.shR.rotation.x=0.5*b-0.9*a;
    f.elL.rotation.x=f.elR.rotation.x=-1.15;
    f.root.position.y=0.95+0.03*Math.abs(Math.sin(t*7));
  },
  "マウンテンクライマー": (f,t)=>{
    f.root.position.y=0.52; f.root.rotation.x=1.25;
    f.shL.rotation.x=f.shR.rotation.x=-1.05;
    f.torso.rotation.x=0.1;
    const a=Math.max(0,Math.sin(t*8)), b=Math.max(0,-Math.sin(t*8));
    f.hipL.rotation.x=-1.35*a+0.15; f.kneeL.rotation.x=1.6*a;
    f.hipR.rotation.x=-1.35*b+0.15; f.kneeR.rotation.x=1.6*b;
  },
  "プランク": (f,t)=>{
    f.root.position.y=0.52+Math.sin(t*2)*0.008;
    f.root.rotation.x=1.3;
    f.shL.rotation.x=f.shR.rotation.x=-1.05;
    f.hipL.rotation.x=f.hipR.rotation.x=0.13;
    f.torso.rotation.x=0.08;
  },
  "ゆるバーピー": (f,t)=>{
    const keys=[
      {u:0.00, p:{ry:0.95, rx:0,    tx:0,    shx:0,     hip:0,     knee:0   }},
      {u:0.22, p:{ry:0.55, rx:0.15, tx:0.9,  shx:-1.9,  hip:-1.7,  knee:2.1 }},
      {u:0.45, p:{ry:0.52, rx:1.25, tx:0.05, shx:-1.05, hip:0.12,  knee:0.1 }},
      {u:0.68, p:{ry:0.55, rx:0.15, tx:0.9,  shx:-1.9,  hip:-1.7,  knee:2.1 }},
      {u:0.88, p:{ry:0.95, rx:0,    tx:0,    shx:0,     hip:0,     knee:0   }},
      {u:1.00, p:{ry:0.95, rx:0,    tx:0,    shx:0,     hip:0,     knee:0   }},
    ];
    const p=lerpKeys(keys,(t%3.4)/3.4);
    f.root.position.y=p.ry; f.root.rotation.x=p.rx; f.torso.rotation.x=p.tx;
    f.shL.rotation.x=f.shR.rotation.x=p.shx;
    f.hipL.rotation.x=f.hipR.rotation.x=p.hip;
    f.kneeL.rotation.x=f.kneeR.rotation.x=p.knee;
  },
  "フロントランジ": (f,t)=>{
    const s=Math.sin(t*2.2), m=Math.abs(s), L=s>0;
    const fr=L?f.hipL:f.hipR, frK=L?f.kneeL:f.kneeR;
    const bk=L?f.hipR:f.hipL, bkK=L?f.kneeR:f.kneeL;
    fr.rotation.x=-1.05*m; frK.rotation.x=1.05*m;
    bk.rotation.x=0.45*m;  bkK.rotation.x=1.15*m;
    f.root.position.y=0.95-0.28*m;
    f.torso.rotation.x=0.12*m;
    f.shL.rotation.x=(L?-0.5:0.4)*m; f.shR.rotation.x=(L?0.4:-0.5)*m;
  },
  "膝つき腕立て": (f,t)=>{
    const c=(1-Math.cos(t*3))/2;
    f.root.position.y=0.6-0.1*c; f.root.rotation.x=0.95+0.13*c;
    f.hipL.rotation.x=f.hipR.rotation.x=-0.55;
    f.kneeL.rotation.x=f.kneeR.rotation.x=1.75;
    f.shL.rotation.x=f.shR.rotation.x=-0.75-0.18*c;
    f.elL.rotation.x=f.elR.rotation.x=-(0.15+c*1.15);
  },
  "バイシクルクランチ": (f,t)=>{
    f.root.position.y=0.33; f.root.rotation.x=-1.45;
    const a=Math.sin(t*5);
    f.hipL.rotation.x=-1.1-0.5*a; f.kneeL.rotation.x=1.2-0.9*a;
    f.hipR.rotation.x=-1.1+0.5*a; f.kneeR.rotation.x=1.2+0.9*a;
    f.torso.rotation.x=0.5; f.torso.rotation.y=0.25*a;
    f.shL.rotation.z=-2.55; f.shR.rotation.z=2.55;
    f.elL.rotation.x=f.elR.rotation.x=-1.3;
  },
  "スケータージャンプ": (f,t)=>{
    const s=Math.sin(t*3.5);
    f.root.position.x=0.35*s;
    f.root.position.y=0.9+0.07*Math.abs(Math.cos(t*3.5));
    f.root.rotation.z=-0.13*s;
    f.torso.rotation.x=0.35;
    f.hipL.rotation.z=0.3*s; f.hipR.rotation.z=0.3*s;
    f.kneeL.rotation.x=f.kneeR.rotation.x=0.55;
    f.shL.rotation.x=-0.6-0.5*s; f.shR.rotation.x=-0.6+0.5*s;
    f.elL.rotation.x=f.elR.rotation.x=-0.9;
  },
  "ヒップリフト": (f,t)=>{
    const c=(1-Math.cos(t*2.4))/2;
    f.root.position.y=0.3+0.17*c;
    f.root.rotation.x=-1.5+0.55*c;
    f.hipL.rotation.x=f.hipR.rotation.x=-0.9+0.3*c;
    f.kneeL.rotation.x=f.kneeR.rotation.x=1.9-0.35*c;
    f.shL.rotation.z=-0.35; f.shR.rotation.z=0.35;
  },
  "その場ジョギング": (f,t)=>{
    const a=Math.max(0,Math.sin(t*6)), b=Math.max(0,-Math.sin(t*6));
    f.hipL.rotation.x=-0.7*a+0.15*b; f.kneeL.rotation.x=1.0*a+0.12;
    f.hipR.rotation.x=-0.7*b+0.15*a; f.kneeR.rotation.x=1.0*b+0.12;
    f.shL.rotation.x=0.5*a-0.7*b; f.shR.rotation.x=0.5*b-0.7*a;
    f.elL.rotation.x=f.elR.rotation.x=-1.2;
    f.root.position.y=0.95+0.02*Math.abs(Math.sin(t*6));
  },
};

/* 3Dデモモーダル */
function ExerciseDemo({name, onClose}){
  const ref = useRef(null);
  const ex = EXERCISES.find(e => e.name === name);

  useEffect(()=>{
    const THREE = window.THREE;
    if(!THREE || !ref.current) return;
    const W = Math.min(330, window.innerWidth - 88), H = W * 0.92;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xF3F5EF);
    const camera = new THREE.PerspectiveCamera(42, W/H, 0.1, 50);
    if(SIDE_VIEW.has(name)) camera.position.set(3.3, 1.25, 1.1);
    else camera.position.set(1.15, 1.5, 3.7);
    camera.lookAt(0, 0.8, 0);

    const renderer = new THREE.WebGLRenderer({antialias:true});
    renderer.setPixelRatio(Math.min(window.devicePixelRatio||1, 2));
    renderer.setSize(W, H);
    ref.current.appendChild(renderer.domElement);

    scene.add(new THREE.HemisphereLight(0xffffff, 0xD8DCD2, 0.95));
    const dl = new THREE.DirectionalLight(0xffffff, 0.7);
    dl.position.set(2, 4, 3); scene.add(dl);

    const ground = new THREE.Mesh(
      new THREE.CircleGeometry(1.7, 40),
      new THREE.MeshStandardMaterial({color:0xE3E8E1, roughness:1})
    );
    ground.rotation.x = -Math.PI/2; scene.add(ground);

    const fig = buildFigure(THREE);
    scene.add(fig.root);
    const pose = POSES[name] || POSES["その場ジョギング"];

    let raf; const t0 = performance.now();
    const loop = () => {
      const t = (performance.now() - t0) / 1000;
      resetPose(fig);
      pose(fig, t);
      renderer.render(scene, camera);
      raf = requestAnimationFrame(loop);
    };
    loop();
    return () => {
      cancelAnimationFrame(raf);
      renderer.dispose();
      if(ref.current) ref.current.innerHTML = "";
    };
  }, [name]);

  return (
    <div style={{position:"fixed", inset:0, background:"rgba(28,43,38,.55)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:60, padding:22}}
      onClick={onClose}>
      <div className="card anim-pop" style={{padding:18, width:"100%", maxWidth:380, textAlign:"center"}} onClick={e=>e.stopPropagation()}>
        <h3 style={{fontSize:18, fontWeight:800, margin:"0 0 2px"}}>{ex ? ex.emoji : "🏃"} {name}</h3>
        {ex && <p className="sub" style={{fontSize:12, margin:"0 0 10px"}}>{ex.tip}</p>}
        <div ref={ref} style={{display:"flex", justifyContent:"center", borderRadius:18, overflow:"hidden", border:"1px solid var(--line)"}}>
          {!window.THREE && <p className="sub" style={{fontSize:12, padding:30}}>3D表示を読み込めませんでした(通信環境をご確認ください)</p>}
        </div>
        <p className="sub" style={{fontSize:10, margin:"8px 0 0"}}>※ 動きのイメージです。実際は無理のない範囲・正しいフォームで行ってください</p>
        <button onClick={onClose} className="btn-dark" style={{marginTop:12, fontSize:15, padding:12}}>閉じる</button>
      </div>
    </div>
  );
}

function App(){
  const [screen, setScreen] = useState("home");
  const [data, setData] = useState(DEFAULT_DATA);
  const [loaded, setLoaded] = useState(false);
  const [course, setCourse] = useState(COURSES[0]);
  const [result, setResult] = useState(null);

  useEffect(() => {
    (async () => {
      const v = await store.get(STORAGE_KEY);
      if(v){ try{ setData({...DEFAULT_DATA, ...JSON.parse(v)}); }catch(e){} }
      setLoaded(true);
    })();
  }, []);

  const saveData = async (d) => { setData(d); await store.set(STORAGE_KEY, JSON.stringify(d)); };

  const todayMenu = useMemo(() => seededShuffle(EXERCISES, hashSeed(todayStr())), []);

  const finishWorkout = (c) => {
    const today = todayStr();
    const prevLv = levelFromXp(data.xp).level;

    let streak = data.streak;
    if(data.lastDate !== today){
      const y = new Date(); y.setDate(y.getDate()-1);
      streak = data.lastDate === dateStrOf(y) ? data.streak + 1 : 1;
    }
    const streakBonus = Math.min(streak,10)*3;
    const gained = c.minutes*10 + streakBonus;
    const xp = data.xp + gained;
    const newLv = levelFromXp(xp).level;
    const evolved = stageOf(newLv) > stageOf(prevLv);
    const kcal = burnKcal(c.minutes, data.weightKg);

    const d = {
      ...data, xp, streak,
      bestStreak: Math.max(data.bestStreak, streak),
      lastDate: today,
      totalWorkouts: data.totalWorkouts+1,
      totalMinutes: data.totalMinutes+c.minutes,
      totalBurn: (data.totalBurn||0)+kcal,
      history: [...data.history, {date:today, minutes:c.minutes, xp:gained, kcal, course:c.label}].slice(-90),
    };
    saveData(d);
    setResult({
      xp:gained, streakBonus, streak, minutes:c.minutes, kcal,
      leveledUp:newLv>prevLv, newLevel:newLv,
      evolved, newStage: STAGES[stageOf(newLv)-1],
    });
    setScreen("done");
  };

  if(!loaded) return <div className="app" style={{justifyContent:"center", alignItems:"center"}}><span className="sub">読み込み中…</span></div>;

  return (
    <div className="app">
      {screen==="home" && <Home data={data} course={course} setCourse={setCourse} todayMenu={todayMenu}
        onStart={()=>setScreen("workout")} onStats={()=>setScreen("stats")} onFood={()=>setScreen("food")}
        saveSettings={(patch)=>saveData({...data, ...patch})} />}
      {screen==="food" && <Food data={data} onBack={()=>setScreen("home")} onSave={saveData} />}
      {screen==="workout" && <Workout course={course} menu={todayMenu.slice(0,course.count)} level={levelFromXp(data.xp).level}
        onFinish={()=>finishWorkout(course)} onQuit={()=>setScreen("home")} />}
      {screen==="done" && <Done result={result} data={data} onHome={()=>setScreen("home")} />}
      {screen==="stats" && <Stats data={data} onBack={()=>setScreen("home")} />}
    </div>
  );
}

/* ---------- ワークアウト ---------- */
function Workout({course, menu, level, onFinish, onQuit}){
  const phases = useMemo(()=>{
    const p=[{type:"ready", duration:10, ex:menu[0]}];
    menu.forEach((ex,i)=>{
      p.push({type:"work", duration:course.work, ex});
      if(i<menu.length-1) p.push({type:"rest", duration:course.rest, ex:menu[i+1]});
    });
    return p;
  },[course, menu]);

  const [idx, setIdx] = useState(0);
  const [secLeft, setSecLeft] = useState(phases[0].duration);
  const [paused, setPaused] = useState(false);
  const [quitArmed, setQuitArmed] = useState(false);
  const [demo, setDemo] = useState(null);
  const {beep, ensure} = useBeeper();
  const finishedRef = useRef(false);

  useEffect(()=>{ ensure(); },[]);

  /* 画面スリープ防止(対応端末のみ) */
  useEffect(()=>{
    let wl=null;
    (async()=>{ try{ if(navigator.wakeLock) wl = await navigator.wakeLock.request("screen"); }catch(e){} })();
    return ()=>{ try{ wl && wl.release(); }catch(e){} };
  },[]);

  useEffect(()=>{
    if(paused) return;
    const id=setInterval(()=>setSecLeft(s=>s-1),1000);
    return ()=>clearInterval(id);
  },[paused, idx]);

  useEffect(()=>{
    if(secLeft>0 && secLeft<=3) beep(880,0.1);
    if(secLeft<=0){
      if(idx>=phases.length-1){
        if(!finishedRef.current){ finishedRef.current=true; beep(1320,0.4,0.3); onFinish(); }
      }else{
        beep(phases[idx+1].type==="work"?1320:660, 0.2, 0.3);
        setIdx(idx+1); setSecLeft(phases[idx+1].duration);
      }
    }
  },[secLeft]);

  const phase = phases[idx];
  const isWork = phase.type==="work";
  const isReady = phase.type==="ready";
  const color = isWork ? "var(--accent)" : "var(--teal)";
  const softColor = isWork ? "var(--accent-soft)" : "var(--teal-soft)";
  const workDone = phases.slice(0,idx).filter(p=>p.type==="work").length;
  const totalWork = menu.length;

  const R=112, C=2*Math.PI*R;
  const frac = Math.max(0,secLeft)/phase.duration;

  const cheer = isReady ? LINES.ready[0]
    : isWork ? pick(LINES.work, phase.ex.name+idx)
    : pick(LINES.rest, idx);

  const skip = () => {
    if(idx>=phases.length-1){ if(!finishedRef.current){ finishedRef.current=true; onFinish(); } }
    else{ setIdx(idx+1); setSecLeft(phases[idx+1].duration); }
  };

  return (
    <div style={{display:"flex", flexDirection:"column", flex:1, margin:"-14px -20px -18px", padding:"calc(14px + env(safe-area-inset-top)) 20px calc(24px + env(safe-area-inset-bottom))", background:softColor, transition:"background .4s"}}>
      <div className="row" style={{justifyContent:"space-between"}}>
        <button onClick={()=>quitArmed?onQuit():setQuitArmed(true)}
          style={{padding:"8px 14px", borderRadius:999, fontSize:14, fontWeight:800,
            background:quitArmed?"var(--ink)":"rgba(255,255,255,.75)", color:quitArmed?"#fff":"var(--ink)"}}>
          {quitArmed?"タップで終了する":"✕"}
        </button>
        <span style={{fontSize:14, fontWeight:800}}>{workDone+(isWork?1:0)} / {totalWork} 種目</span>
        <div style={{width:60}}/>
      </div>

      <div className="row" style={{gap:4, marginTop:10}}>
        {menu.map((_,i)=>(
          <div key={i} style={{flex:1, height:6, borderRadius:999, background:i<workDone+(isWork?1:0)?color:"rgba(255,255,255,.85)"}}/>
        ))}
      </div>

      <div style={{textAlign:"center", marginTop:18}}>
        <span style={{display:"inline-block", padding:"6px 16px", borderRadius:999, fontSize:14, fontWeight:800, letterSpacing:".06em", background:color, color:"#fff"}}>
          {isReady?"スタート準備":isWork?"🔥 ワーク":"😮‍💨 休憩"}
        </span>
        <h2 key={phase.ex.name+phase.type} className="anim-pop" style={{fontSize:26, fontWeight:800, margin:"12px 0 0", lineHeight:1.4}}>
          {(isReady||phase.type==="rest") && <span className="sub" style={{display:"block", fontSize:14, fontWeight:700}}>次の種目</span>}
          {phase.ex.emoji} {phase.ex.name}
        </h2>
        <p className="sub" style={{fontSize:13, margin:"6px 24px 0"}}>{phase.ex.tip}</p>
        <button onClick={()=>{ setPaused(true); setDemo(phase.ex.name); }}
          style={{marginTop:8, padding:"7px 16px", borderRadius:999, fontSize:12, fontWeight:800, background:"rgba(255,255,255,.85)", color:"var(--ink)", border:"1px solid var(--line)"}}>
          🎥 動きを3Dで見る
        </button>
      </div>

      {/* タイマーリング */}
      <div style={{flex:1, display:"flex", alignItems:"center", justifyContent:"center", margin:"6px 0"}}>
        <div style={{position:"relative", width:256, height:256}}>
          <svg width="256" height="256" viewBox="0 0 256 256" style={{transform:"rotate(-90deg)"}}>
            <circle cx="128" cy="128" r={R} fill="none" stroke="rgba(255,255,255,.9)" strokeWidth="15"/>
            <circle cx="128" cy="128" r={R} fill="none" stroke={color} strokeWidth="15" strokeLinecap="round"
              strokeDasharray={C} strokeDashoffset={C*(1-frac)}
              style={{transition:"stroke-dashoffset 1s linear, stroke .4s"}}/>
          </svg>
          <div style={{position:"absolute", inset:0, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center"}}>
            <span className="bebas" style={{fontSize:84, lineHeight:1}}>{Math.max(0,secLeft)}</span>
            <span className="sub" style={{fontSize:13, fontWeight:800, marginTop:-2}}>秒</span>
          </div>
        </div>
      </div>

      {/* メラの応援 */}
      <div className="row" style={{justifyContent:"center", gap:4, marginBottom:8}}>
        <Mela stage={stageOf(level)} mood={isWork?"fired":"rest"} size={78} cheering={isWork && !paused}/>
        <div className="bubble" style={{fontSize:12}}>{paused?"ひと休みも大事!":cheer}</div>
      </div>

      <div className="row" style={{justifyContent:"center", gap:16}}>
        <button onClick={()=>setPaused(!paused)} aria-label={paused?"再開":"一時停止"}
          style={{width:76, height:76, borderRadius:"50%", background:"var(--ink)", color:"#fff", fontSize:26, boxShadow:"0 8px 20px rgba(28,43,38,.3)"}}>
          {paused?"▶":"⏸"}
        </button>
        <button onClick={skip} aria-label="スキップ"
          style={{width:54, height:54, borderRadius:"50%", background:"rgba(255,255,255,.9)", fontSize:20}}>
          ⏭
        </button>
      </div>

      {demo && <ExerciseDemo name={demo} onClose={()=>setDemo(null)}/>}
    </div>
  );
}

/* ---------- デイリー記録(食事・体重・アクティビティの閲覧&編集) ---------- */
function Food({data, onBack, onSave}){
  const [viewDate, setViewDate] = useState(todayStr());
  const [mealType, setMealType] = useState(guessMeal());
  const [q, setQ] = useState("");
  const [ckcal, setCkcal] = useState("");
  const [kcalTouched, setKcalTouched] = useState(false);
  const [added, setAdded] = useState("");
  const [wIn, setWIn] = useState("");

  const today = todayStr();
  const isToday = viewDate === today;
  const dObj = new Date(viewDate + "T00:00:00");
  const dateLabel = isToday ? "今日" : `${dObj.getMonth()+1}/${dObj.getDate()}(${"日月火水木金土"[dObj.getDay()]})`;

  const shiftDate = (n) => {
    const d = new Date(viewDate + "T00:00:00");
    d.setDate(d.getDate() + n);
    const ds = dateStrOf(d);
    if (ds > today) return;
    setViewDate(ds);
  };

  const meals = data.meals || [];
  const dayMeals = meals.filter(m => m.date === viewDate);
  const dayWorkouts = data.history.filter(h => h.date === viewDate);
  const intake = dayMeals.reduce((a,m) => a + m.kcal, 0);
  const burn = dayWorkouts.reduce((a,h) => a + (h.kcal||0), 0);
  const target = data.targetKcal || 2000;
  const remain = target + burn - intake;
  const frac = Math.min(1, intake / ((target+burn)||1));

  const dayWeight = (data.weights||[]).find(x => x.date === viewDate);

  /* 食品追加(選択中の日付に記録) */
  const addFood = (name, kcal) => {
    if(!name || !(kcal >= 0)) return;
    const entry = {id: Date.now()+"-"+Math.floor(Math.random()*1e6), date:viewDate, meal:mealType, name, kcal:Math.round(kcal)};
    onSave({...data, meals:[...meals, entry].slice(-1500)});
    setAdded(name); setTimeout(()=>setAdded(""), 1200);
  };
  const removeFood = (id) => onSave({...data, meals: meals.filter(m => m.id !== id)});

  /* ワークアウト削除(合計から差し引き。XP・連続記録は保持) */
  const removeWorkout = (h) => {
    const i = data.history.indexOf(h);
    if(i < 0) return;
    const history = [...data.history]; history.splice(i,1);
    onSave({
      ...data, history,
      totalWorkouts: Math.max(0, data.totalWorkouts-1),
      totalMinutes: Math.max(0, data.totalMinutes - h.minutes),
      totalBurn: Math.max(0, (data.totalBurn||0) - (h.kcal||0)),
    });
  };

  /* 体重記録(選択中の日付) */
  const saveWeight = () => {
    const kg = Math.round((Number(wIn)||0)*10)/10;
    if(kg < 25 || kg > 200) return;
    const rest = (data.weights||[]).filter(x => x.date !== viewDate);
    const patch = {weights:[...rest, {date:viewDate, kg}].sort((a,b)=>a.date<b.date?-1:1).slice(-365)};
    if(isToday) patch.weightKg = kg;
    onSave({...data, ...patch});
    setWIn("");
  };

  /* 表記ゆれに強い正規化(全角半角・ひらがな→カタカナ・空白除去) */
  const norm = (s) => (s||"").normalize("NFKC").replace(/\s+/g,"")
    .replace(/[ぁ-ん]/g, ch => String.fromCharCode(ch.charCodeAt(0)+0x60));

  const matchFoods = (v) => {
    const nq = norm(v);
    if(!nq) return [];
    const hit = FOODS.filter(f => norm(f.name).includes(nq));
    if(hit.length) return hit;
    /* 「牛丼大盛」→「牛丼 並盛」のように、入力がDB名の先頭語を含む場合も拾う */
    return FOODS.filter(f => {
      const head = norm(f.name.split(" ")[0]);
      return head.length >= 2 && nq.includes(head);
    });
  };

  const matches = matchFoods(q);
  const best = matches[0] || null;

  /* 検索欄への入力でカロリーを自動補完 */
  const onQChange = (v) => {
    setQ(v);
    if(v.trim() === ""){ setKcalTouched(false); setCkcal(""); return; }
    if(!kcalTouched){
      const m = matchFoods(v)[0];
      setCkcal(m ? String(m.kcal) : "");
    }
  };

  return (
    <div className="anim-rise" style={{display:"flex", flexDirection:"column", flex:1}}>
      <div className="row" style={{gap:10}}>
        <button onClick={onBack} className="card" aria-label="戻る" style={{padding:"8px 12px", borderRadius:14, fontSize:15}}>◀</button>
        <h1 style={{fontSize:23, fontWeight:800, margin:0}}>デイリー記録</h1>
      </div>

      {/* 日付ナビ */}
      <div className="row" style={{justifyContent:"space-between", marginTop:12}}>
        <button onClick={()=>shiftDate(-1)} className="card" style={{padding:"8px 16px", borderRadius:999, fontSize:14, fontWeight:800}}>‹ 前日</button>
        <span style={{fontSize:17, fontWeight:800}}>{dateLabel}</span>
        <button onClick={()=>shiftDate(1)} disabled={isToday} className="card"
          style={{padding:"8px 16px", borderRadius:999, fontSize:14, fontWeight:800, opacity:isToday?0.35:1}}>翌日 ›</button>
      </div>

      {/* 収支サマリー */}
      <div style={{background:"var(--ink)", color:"#fff", borderRadius:24, padding:"16px 20px", marginTop:12}}>
        <div className="row" style={{justifyContent:"space-between", alignItems:"baseline"}}>
          <span style={{fontSize:12, fontWeight:800, color:"rgba(255,255,255,.65)"}}>{dateLabel}の摂取</span>
          <span style={{fontSize:12, fontWeight:800, color:"rgba(255,255,255,.65)"}}>目標 {target}{burn>0?` + 運動 ${burn}`:""} kcal</span>
        </div>
        <div className="row" style={{gap:5, alignItems:"baseline", marginTop:2}}>
          <span className="bebas" style={{fontSize:40, lineHeight:1}}>{intake}</span>
          <span style={{fontSize:13, fontWeight:800, color:"rgba(255,255,255,.65)"}}>kcal</span>
        </div>
        <div style={{marginTop:10, height:10, borderRadius:999, background:"rgba(255,255,255,.15)", overflow:"hidden"}}>
          <div style={{height:"100%", width:`${frac*100}%`, background:remain<0?"#FF6B5E":"var(--gold)", borderRadius:999, transition:"width .5s"}}/>
        </div>
        <p style={{fontSize:12, fontWeight:800, margin:"8px 0 0", color:remain<0?"#FFB4AC":"rgba(255,255,255,.8)"}}>
          {remain>=0 ? (isToday ? `あと ${remain} kcal 食べられます` : `${remain} kcal 余裕がありました`) : `${-remain} kcal オーバー`}
        </p>
      </div>

      {/* この日の体重 */}
      <div className="card" style={{padding:"12px 16px", marginTop:10}}>
        <div className="row" style={{justifyContent:"space-between"}}>
          <span className="sub" style={{fontSize:12, fontWeight:800}}>⚖️ {dateLabel}の体重</span>
          {dayWeight && <span style={{fontSize:12, fontWeight:800, color:"var(--teal)"}}>✓ {dayWeight.kg} kg</span>}
        </div>
        <div className="row" style={{gap:8, marginTop:8}}>
          <input className="field" type="number" inputMode="decimal" step="0.1"
            placeholder={dayWeight ? `${dayWeight.kg} kg(修正できます)` : "例: 65.5"}
            value={wIn} onChange={e=>setWIn(e.target.value)} style={{marginTop:0, flex:1}}/>
          <button onClick={saveWeight} style={{padding:"11px 18px", borderRadius:14, background:"var(--ink)", color:"#fff", fontWeight:800, fontSize:14, flexShrink:0}}>
            {dayWeight ? "修正" : "記録"}
          </button>
        </div>
      </div>

      {/* この日のアクティビティ */}
      <p className="sub" style={{fontSize:12, fontWeight:800, margin:"16px 0 6px"}}>🔥 {dateLabel}のアクティビティ</p>
      {dayWorkouts.length === 0 ? (
        <div className="card" style={{padding:"12px 16px"}}>
          <p className="sub" style={{fontSize:12, margin:0}}>ワークアウトの記録はありません</p>
        </div>
      ) : (
        <div style={{display:"flex", flexDirection:"column", gap:6}}>
          {dayWorkouts.map((h,i)=>(
            <div key={i} className="card row" style={{padding:"11px 16px", borderRadius:18, justifyContent:"space-between"}}>
              <div>
                <p style={{fontSize:14, fontWeight:800, margin:0}}>{h.course}</p>
                <p className="sub" style={{fontSize:11, margin:0}}>{h.minutes}分 ・ 約{h.kcal||0} kcal ・ +{h.xp} XP</p>
              </div>
              <button onClick={()=>{ if(window.confirm("この記録を削除しますか?(XPと連続記録は保持されます)")) removeWorkout(h); }}
                aria-label="削除" className="sub" style={{fontSize:14, padding:"4px 8px"}}>✕</button>
            </div>
          ))}
        </div>
      )}

      {/* 食事タイプ */}
      <p className="sub" style={{fontSize:12, fontWeight:800, margin:"16px 0 6px"}}>🍽 {dateLabel}の食事を追加</p>
      <div className="row" style={{gap:6}}>
        {MEAL_TYPES.map(m=>(
          <button key={m} onClick={()=>setMealType(m)} className={"mealtab"+(mealType===m?" on":"")}>{m}</button>
        ))}
      </div>

      {/* 検索・入力(kcal自動補完) */}
      <input className="field" placeholder="食べたものを入力(例:ごはん、牛丼、ビール)" value={q} onChange={e=>onQChange(e.target.value)} style={{marginTop:10}}/>
      {added && <p className="anim-pop" style={{fontSize:12, fontWeight:800, color:"var(--teal)", margin:"8px 0 0", textAlign:"center"}}>✓ 「{added}」を{dateLabel}の{mealType}に追加しました</p>}

      {/* 入力中:この内容で追加 */}
      {q.trim() !== "" && (
        <div className="card" style={{padding:"12px 14px", marginTop:10}}>
          {best && !kcalTouched
            ? <p className="sub" style={{fontSize:11, margin:"0 0 6px"}}>💡 「{best.name}」の目安 <b style={{color:"var(--accent)"}}>{best.kcal} kcal</b> を自動入力しました(修正できます)</p>
            : !best && <p className="sub" style={{fontSize:11, margin:"0 0 6px"}}>データベースに近い候補がありません。kcalを入力してください</p>}
          <div className="row" style={{gap:6}}>
            <span style={{flex:2, fontSize:14, fontWeight:800, padding:"11px 4px", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap"}}>{q.trim()}</span>
            <input className="field" type="number" inputMode="numeric" placeholder="kcal" value={ckcal}
              onChange={e=>{ setCkcal(e.target.value); setKcalTouched(true); }} style={{marginTop:0, flex:1}}/>
            <button onClick={()=>{ addFood(q.trim(), Number(ckcal)); setQ(""); setCkcal(""); setKcalTouched(false); }}
              style={{padding:"11px 16px", borderRadius:14, background:"var(--accent)", color:"#fff", fontWeight:800, fontSize:14, flexShrink:0}}>追加</button>
          </div>
        </div>
      )}

      {/* 食品リスト */}
      {q.trim() !== "" ? (
        <div className="row" style={{flexWrap:"wrap", gap:6, marginTop:10}}>
          {matches.map((f,i)=>(
            <button key={i} className="foodchip" onClick={()=>{ addFood(f.name, f.kcal); setQ(""); setCkcal(""); setKcalTouched(false); }}>{f.name} <span style={{color:"var(--accent)"}}>{f.kcal}</span></button>
          ))}
        </div>
      ) : (
        <div style={{marginTop:6}}>
          {FOOD_CATS.map(cat=>(
            <div key={cat}>
              <p className="sub" style={{fontSize:12, fontWeight:800, margin:"12px 0 6px"}}>{cat}</p>
              <div className="row" style={{flexWrap:"wrap", gap:6}}>
                {FOODS.filter(f=>f.cat===cat).map((f,i)=>(
                  <button key={i} className="foodchip" onClick={()=>addFood(f.name, f.kcal)}>{f.name} <span style={{color:"var(--accent)"}}>{f.kcal}</span></button>
                ))}
              </div>
            </div>
          ))}
        </div>
      )}

      {/* この日のログ */}
      {dayMeals.length>0 && (
        <>
          <p className="sub" style={{fontSize:12, fontWeight:800, margin:"18px 0 6px"}}>{dateLabel}食べたもの</p>
          <div style={{display:"flex", flexDirection:"column", gap:6, paddingBottom:8}}>
            {MEAL_TYPES.map(mt=>{
              const items = dayMeals.filter(m=>m.meal===mt);
              if(items.length===0) return null;
              return (
                <div key={mt} className="card" style={{padding:"10px 14px", borderRadius:18}}>
                  <p className="sub" style={{fontSize:11, fontWeight:800, margin:"0 0 4px"}}>{mt} — {items.reduce((a,m)=>a+m.kcal,0)} kcal</p>
                  {items.map(m=>(
                    <div key={m.id} className="row" style={{justifyContent:"space-between", padding:"3px 0"}}>
                      <span style={{fontSize:13, fontWeight:700}}>{m.name}</span>
                      <span className="row" style={{gap:8}}>
                        <span style={{fontSize:13, fontWeight:800, color:"var(--accent)"}}>{m.kcal}</span>
                        <button onClick={()=>removeFood(m.id)} aria-label="削除" className="sub" style={{fontSize:13}}>✕</button>
                      </span>
                    </div>
                  ))}
                </div>
              );
            })}
          </div>
        </>
      )}

      <p className="sub" style={{fontSize:10, lineHeight:1.6, margin:"14px 0 4px"}}>
        ※ カロリーは一般的な目安による推定値です。正確な管理が必要な場合は栄養成分表示をご確認ください。
      </p>
    </div>
  );
}

/* ---------- 体重推移グラフ ---------- */
function WeightChart({weights}){
  const ws = [...(weights||[])].sort((a,b)=>a.date<b.date?-1:1).slice(-30);
  if(ws.length === 0) return <p className="sub" style={{fontSize:12, margin:0}}>まだ体重の記録がありません。ホーム画面から今日の体重を記録してみましょう</p>;
  if(ws.length === 1) return <p className="sub" style={{fontSize:12, margin:0}}>現在 <b style={{color:"var(--ink)"}}>{ws[0].kg} kg</b>。2日分たまるとグラフが表示されます</p>;

  const W=320, H=130, padL=34, padR=14, padT=16, padB=22;
  const kgs = ws.map(w=>w.kg);
  const rawMin = Math.min(...kgs), rawMax = Math.max(...kgs);
  const span = Math.max(1, rawMax-rawMin);
  const min = rawMin - span*0.15, max = rawMax + span*0.15;
  const x = (i) => padL + (i/(ws.length-1)) * (W-padL-padR);
  const y = (kg) => padT + (1-(kg-min)/(max-min)) * (H-padT-padB);
  const pts = ws.map((w,i)=>`${x(i)},${y(w.kg)}`).join(" ");
  const first = ws[0], last = ws[ws.length-1];
  const diff = Math.round((last.kg-first.kg)*10)/10;
  const lbl = (d)=>{ const t=new Date(d+"T00:00:00"); return `${t.getMonth()+1}/${t.getDate()}`; };

  return (
    <div>
      <div className="row" style={{justifyContent:"space-between", marginBottom:6}}>
        <span style={{fontSize:14, fontWeight:800}}>現在 {last.kg} kg</span>
        <span style={{fontSize:12, fontWeight:800, color:diff<0?"var(--teal)":diff>0?"var(--accent)":"var(--sub)"}}>
          {lbl(first.date)}から {diff>0?"+":""}{diff} kg
        </span>
      </div>
      <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%", height:"auto", display:"block"}}>
        {[rawMax, rawMin].map((v,i)=>(
          <g key={i}>
            <line x1={padL} x2={W-padR} y1={y(v)} y2={y(v)} stroke="var(--line)" strokeDasharray="3 4" strokeWidth="1"/>
            <text x={padL-5} y={y(v)+3.5} fontSize="9" fontWeight="700" fill="#6B7A73" textAnchor="end">{v}</text>
          </g>
        ))}
        <polyline points={pts} fill="none" stroke="var(--accent)" strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round"/>
        {ws.map((w,i)=>(
          <circle key={i} cx={x(i)} cy={y(w.kg)} r={i===ws.length-1?4:2.5} fill={i===ws.length-1?"var(--accent)":"#fff"} stroke="var(--accent)" strokeWidth="2"/>
        ))}
        <text x={x(0)} y={H-6} fontSize="9" fontWeight="700" fill="#6B7A73" textAnchor="start">{lbl(first.date)}</text>
        <text x={x(ws.length-1)} y={H-6} fontSize="9" fontWeight="700" fill="#6B7A73" textAnchor="end">{lbl(last.date)}</text>
      </svg>
    </div>
  );
}

/* ---------- 記録 ---------- */
function Stats({data, onBack}){
  const lv = levelFromXp(data.xp);
  const stage = stageOf(lv.level);
  const title = TITLES[Math.min(lv.level-1, TITLES.length-1)];
  const days = [...Array(7)].map((_,i)=>{
    const d=new Date(); d.setDate(d.getDate()-(6-i));
    const ds=dateStrOf(d);
    return {label:`${d.getMonth()+1}/${d.getDate()}`, minutes:data.history.filter(h=>h.date===ds).reduce((a,h)=>a+h.minutes,0)};
  });
  const maxMin = Math.max(10, ...days.map(d=>d.minutes));

  return (
    <div className="anim-rise" style={{display:"flex", flexDirection:"column", flex:1}}>
      <div className="row" style={{gap:10}}>
        <button onClick={onBack} className="card" aria-label="戻る" style={{padding:"8px 12px", borderRadius:14, fontSize:15}}>◀</button>
        <h1 style={{fontSize:23, fontWeight:800, margin:0}}>これまでの記録</h1>
      </div>

      {/* ランク */}
      <div style={{background:"var(--ink)", color:"#fff", borderRadius:24, padding:"18px 20px", marginTop:16, textAlign:"center"}}>
        <p style={{fontSize:12, fontWeight:800, color:"rgba(255,255,255,.6)", margin:0}}>現在のランク</p>
        <p style={{fontSize:26, fontWeight:800, margin:"4px 0 0"}}>Lv.{lv.level} {title}</p>
        <p style={{fontSize:12, color:"rgba(255,255,255,.6)", margin:"2px 0 0"}}>累計 {data.xp} XP</p>
      </div>

      {/* 体重推移 */}
      <p className="sub" style={{fontSize:13, fontWeight:800, margin:"18px 0 8px"}}>体重の推移(直近30回)</p>
      <div className="card" style={{padding:16}}>
        <WeightChart weights={data.weights}/>
      </div>

      {/* メラの成長 */}
      <p className="sub" style={{fontSize:13, fontWeight:800, margin:"18px 0 8px"}}>メラの成長</p>
      <div className="card" style={{padding:"14px 16px"}}>
        {STAGES.map((s,i)=>{
          const reached = stage >= s.stage;
          const current = stage === s.stage;
          return (
            <div key={i} className="row" style={{gap:10, padding:"7px 0", opacity:reached?1:.45}}>
              <div style={{
                width:30, height:30, borderRadius:"50%", flexShrink:0,
                display:"flex", alignItems:"center", justifyContent:"center",
                background:reached?"var(--accent)":"var(--line)", color:"#fff", fontSize:15, fontWeight:800,
              }}>{reached?"🔥":"?"}</div>
              <div style={{flex:1}}>
                <span style={{fontSize:14, fontWeight:800}}>{s.name}</span>
                <span className="sub" style={{fontSize:11, marginLeft:8}}>{reached?s.desc:`Lv.${s.lv}で進化`}</span>
              </div>
              {current && <span className="chip" style={{background:"var(--accent-soft)", color:"var(--accent)"}}>いまここ</span>}
            </div>
          );
        })}
      </div>

      <div className="grid2" style={{marginTop:12}}>
        {[["合計回数",data.totalWorkouts,"回"],["合計時間",data.totalMinutes,"分"],["最長連続",data.bestStreak,"日"],["累計消費",data.totalBurn||0,"kcal"]].map((s,i)=>(
          <div key={i} className="card" style={{padding:"12px 8px", textAlign:"center"}}>
            <p className="sub" style={{fontSize:11, fontWeight:800, margin:0}}>{s[0]}</p>
            <p style={{margin:"2px 0 0"}}>
              <span className="bebas" style={{fontSize:26}}>{s[1]}</span>
              <span className="sub" style={{fontSize:11, marginLeft:2}}>{s[2]}</span>
            </p>
          </div>
        ))}
      </div>

      <p className="sub" style={{fontSize:13, fontWeight:800, margin:"18px 0 8px"}}>直近7日間の運動時間</p>
      <div className="card" style={{padding:16}}>
        <div className="row" style={{alignItems:"flex-end", gap:8, height:130}}>
          {days.map((d,i)=>(
            <div key={i} style={{flex:1, height:"100%", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"flex-end", gap:4}}>
              {d.minutes>0 && <span style={{fontSize:10, fontWeight:800, color:"var(--accent)"}}>{d.minutes}</span>}
              <div style={{width:"100%", borderRadius:"8px 8px 0 0",
                height:`${(d.minutes/maxMin)*100}%`, minHeight:d.minutes>0?8:3,
                background:d.minutes>0?"var(--accent)":"var(--line)", transition:"height .5s"}}/>
              <span className="sub" style={{fontSize:10, fontWeight:800}}>{d.label}</span>
            </div>
          ))}
        </div>
      </div>

      {data.history.length>0 ? (
        <>
          <p className="sub" style={{fontSize:13, fontWeight:800, margin:"18px 0 8px"}}>最近のワークアウト</p>
          <div style={{display:"flex", flexDirection:"column", gap:8, paddingBottom:8}}>
            {[...data.history].reverse().slice(0,8).map((h,i)=>(
              <div key={i} className="card row" style={{padding:"11px 16px", borderRadius:18, justifyContent:"space-between"}}>
                <div>
                  <p style={{fontSize:14, fontWeight:800, margin:0}}>{h.course}</p>
                  <p className="sub" style={{fontSize:11, margin:0}}>{h.date}</p>
                </div>
                <span style={{textAlign:"right"}}>
                  <span style={{fontSize:14, fontWeight:800, color:"var(--gold)", display:"block"}}>+{h.xp} XP</span>
                  {h.kcal>0 && <span style={{fontSize:11, fontWeight:800, color:"var(--teal)"}}>約{h.kcal} kcal</span>}
                </span>
              </div>
            ))}
          </div>
        </>
      ) : (
        <p className="sub" style={{fontSize:13, textAlign:"center", marginTop:28}}>まだ記録がありません。最初の1本から始めましょう!</p>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
